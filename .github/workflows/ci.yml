name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (legacy peer deps off — eslint 9 정합)
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # Playwright 시각 회귀는 baseline 이 darwin 으로만 잡혀있어
  # Linux 환경에선 폰트/렌더 차이로 fail 발생. Linux baseline 추가 후 활성화.
  # 활성화 단계:
  #   1) macOS 에서 OS=linux baseline 생성 (Docker)
  #   2) tests/*-snapshots/*-desktop-linux.png 추가 commit
  #   3) 본 job 의 if: false 제거
  visual:
    name: Playwright visual regression
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v4
      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
